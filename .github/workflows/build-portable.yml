name: 🚀 Build LatencyZero Portable EXE

on:
  workflow_dispatch:
    inputs:
      build_reason:
        description: 'Build reason (optional)'
        required: false
        default: 'Manual build'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'examples/**'
      - '.gitignore'

permissions:
  contents: write

jobs:
  quality-check:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: ✅ Run tests
        run: npx jest --no-cache

  build:
    needs: quality-check
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🗄️ Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "file:./db/custom.db"

      - name: ⚡ Build Next.js standalone
        run: npx next build
        env:
          DATABASE_URL: "file:./db/custom.db"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: 📂 Copy static assets
        shell: cmd
        run: |
          if exist .next\static xcopy /E /I /Y .next\static .next\standalone\.next\static >nul
          if exist public xcopy /E /I /Y public .next\standalone\public >nul

      - name: ⚡ Compile Electron
        shell: cmd
        run: |
          if not exist electron-dist mkdir electron-dist
          npx esbuild electron/main.ts --bundle --platform=node --outfile=electron-dist/main.js --external:electron
          npx esbuild electron/preload.ts --bundle --platform=node --outfile=electron-dist/preload.js --external:electron

      - name: 🎯 Build portable EXE
        run: npx electron-builder --win portable --config electron-builder.yml --publish never

      - name: 📤 Upload LatencyZero.exe
        uses: actions/upload-artifact@v4
        with:
          name: LatencyZero-Portable-EXE
          path: release/LatencyZero.exe
          retention-days: 90
          if-no-files-found: error
