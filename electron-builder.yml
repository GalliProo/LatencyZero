appId: com.latencyzero.app
productName: LatencyZero

directories:
  output: release

asar: false
compression: maximum

files:
  - from: "."
    filter:
      - "electron-dist/**/*"
      - ".next/standalone/**/*"
      - ".next/static/**/*"
      - "public/**/*"
      - "prisma/**/*"
      - "package.json"
      - "!**/node_modules/@prisma/client/**"
      - "!**/node_modules/.prisma/**"

extraResources:
  - from: ".next/standalone"
    to: "app/.next/standalone"
    filter:
      - "**/*"
      - "!node_modules/@prisma/client/**"
      - "!node_modules/.prisma/**"
  - from: ".next/static"
    to: "app/.next/static"
  - from: "public"
    to: "app/public"
  - from: "electron-dist"
    to: "app/electron-dist"
  - from: "prisma"
    to: "app/prisma"

win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: "LatencyZero.exe"
