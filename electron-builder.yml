appId: com.latencyzero.app
productName: LatencyZero

directories:
  output: release

files:
  - ".next/standalone/**/*"
  - ".next/static/**/*"
  - "public/**/*"
  - "electron-dist/**/*"
  - "electron/resources/**/*"
  - "prisma/**/*"
  - "package.json"

extraResources:
  - from: ".next/standalone"
    to: "app/.next/standalone"
  - from: ".next/static"
    to: "app/.next/static"
  - from: "public"
    to: "app/public"
  - from: "electron-dist"
    to: "app/electron-dist"
  - from: "prisma"
    to: "app/prisma"

win:
  target:
    - portable
  artifactName: "LatencyZero.exe"

asar: false
compression: maximum
